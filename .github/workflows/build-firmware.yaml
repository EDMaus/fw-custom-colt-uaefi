name: Create Board Firmware

on:
  schedule:
    - cron: '0 0 * * *'
  push:
  workflow_dispatch:

jobs:
  build-firmware:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set run variables
        id: set-variables
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "release_date=$(date +'%Y-%m-%d')" >> "$GITHUB_ENV"
            echo "release_date=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          else
            echo "release_date=" >> "$GITHUB_OUTPUT"
          fi

          echo "push=false" >> "$GITHUB_OUTPUT"
          echo "sim=false" >> "$GITHUB_OUTPUT"

      - name: Debug board configuration
        shell: bash
        run: |
          echo "HEAD SHA:"
          git rev-parse HEAD
          echo

          echo "Submodule status:"
          git submodule status
          echo

          echo "---- boards/uaefi_pro/board_configuration.cpp lines 1-120 ----"
          sed -n '1,120p' boards/uaefi_pro/board_configuration.cpp
          echo

          echo "---- grep acSwitch ----"
          grep -R -n "acSwitch" boards/uaefi_pro/board_configuration.cpp || true
          echo

          echo "---- grep setTPS1Inputs ----"
          grep -R -n "setTPS1Inputs" boards/uaefi_pro/board_configuration.cpp || true
          echo

          echo "---- grep MM100_IN_BUTTON2 in repo ----"
          grep -R -n "MM100_IN_BUTTON2" . || true
          echo

      - name: Build custom board firmware
        uses: ./ext/rusefi/.github/workflows/custom-board-build
        with:
          meta_info: boards/uaefi_pro/meta-info.env
          new_tag: ${{ steps.set-variables.outputs.release_date }}
          artifacts: bin srec hex list map elf bundle autoupdate bootloader
          uploads: ini
          push: ${{ steps.set-variables.outputs.push }}
          run_simulator: ${{ steps.set-variables.outputs.sim }}
          MY_REPO_PAT: ${{ secrets.MY_REPO_PAT }}
          RUSEFI_ONLINE_FTP_USER: ${{ secrets.RUSEFI_ONLINE_FTP_USER }}
          RUSEFI_ONLINE_FTP_PASS: ${{ secrets.RUSEFI_ONLINE_FTP_PASS }}
          RUSEFI_FTP_SERVER: ${{ secrets.RUSEFI_FTP_SERVER }}
          RUSEFI_SSH_SERVER: ${{ secrets.RUSEFI_SSH_SERVER }}
          RUSEFI_SSH_USER: ${{ secrets.RUSEFI_SSH_USER }}
          RUSEFI_SSH_PASS: ${{ secrets.RUSEFI_SSH_PASS }}
          ADDITIONAL_ENV: ${{ secrets.ADDITIONAL_ENV }}

      - name: Upload correct OpenBLT update SREC
        uses: actions/upload-artifact@v4
        with:
          name: rusefi_update_uaefi_pro.srec
          path: ext/rusefi/firmware/build/rusefi.srec


      - name: Generate firmware file reports
        shell: bash
        run: |
          {
            echo "---- All SREC files ----"
            find . -type f \( -name "*.srec" -o -name "*.SREC" \) -print -exec ls -lh {} \;
            echo
            echo "---- All BIN files ----"
            find . -type f \( -name "*.bin" -o -name "*.BIN" \) -print -exec ls -lh {} \;
            echo
            echo "---- All ELF files ----"
            find . -type f \( -name "*.elf" -o -name "*.ELF" \) -print -exec ls -lh {} \;
            echo
            echo "---- All MAP files ----"
            find . -type f \( -name "*.map" -o -name "*.MAP" \) -print -exec ls -lh {} \;
            echo
          } | tee firmware_file_report.txt

      - name: Upload firmware file report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-file-report
          path: firmware_file_report.txt

