name: Create Board Firmware

on:
  schedule:
    - cron: '0 0 * * *'
  push:
  workflow_dispatch:

jobs:
  build-firmware:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set run variables
        id: set-variables
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "release_date=$(date +'%Y-%m-%d')" >> "$GITHUB_ENV"
            echo "release_date=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          else
            echo "release_date=" >> "$GITHUB_OUTPUT"
          fi

          echo "push=false" >> "$GITHUB_OUTPUT"
          echo "sim=false" >> "$GITHUB_OUTPUT"

      - name: Debug board configuration
        shell: bash
        run: |
          echo "HEAD SHA:"
          git rev-parse HEAD
          echo

          echo "Submodule status:"
          git submodule status
          echo

          echo "---- boards/uaefi_pro/board_configuration.cpp lines 1-120 ----"
          sed -n '1,120p' boards/uaefi_pro/board_configuration.cpp
          echo

          echo "---- grep acSwitch ----"
          grep -R -n "acSwitch" boards/uaefi_pro/board_configuration.cpp || true
          echo

          echo "---- grep setTPS1Inputs ----"
          grep -R -n "setTPS1Inputs" boards/uaefi_pro/board_configuration.cpp || true
          echo

          echo "---- grep MM100_IN_BUTTON2 in repo ----"
          grep -R -n "MM100_IN_BUTTON2" . || true
          echo

      - name: Build custom board firmware
        uses: ./ext/rusefi/.github/workflows/custom-board-build
        with:
          meta_info: boards/uaefi_pro/meta-info.env
          new_tag: ${{ steps.set-variables.outputs.release_date }}
          artifacts: bin srec hex list map elf bundle autoupdate bootloader
          uploads: ini
          push: ${{ steps.set-variables.outputs.push }}
          run_simulator: ${{ steps.set-variables.outputs.sim }}
          MY_REPO_PAT: ${{ secrets.MY_REPO_PAT }}
          RUSEFI_ONLINE_FTP_USER: ${{ secrets.RUSEFI_ONLINE_FTP_USER }}
          RUSEFI_ONLINE_FTP_PASS: ${{ secrets.RUSEFI_ONLINE_FTP_PASS }}
          RUSEFI_FTP_SERVER: ${{ secrets.RUSEFI_FTP_SERVER }}
          RUSEFI_SSH_SERVER: ${{ secrets.RUSEFI_SSH_SERVER }}
          RUSEFI_SSH_USER: ${{ secrets.RUSEFI_SSH_USER }}
          RUSEFI_SSH_PASS: ${{ secrets.RUSEFI_SSH_PASS }}
          ADDITIONAL_ENV: ${{ secrets.ADDITIONAL_ENV }}

      - name: Generate firmware file reports
        shell: bash
        run: |
          {
            echo "---- All SREC files ----"
            find . -type f \( -name "*.srec" -o -name "*.SREC" \) -print -exec ls -lh {} \;
            echo
            echo "---- All BIN files ----"
            find . -type f \( -name "*.bin" -o -name "*.BIN" \) -print -exec ls -lh {} \;
            echo
            echo "---- All ELF files ----"
            find . -type f \( -name "*.elf" -o -name "*.ELF" \) -print -exec ls -lh {} \;
            echo
            echo "---- All MAP files ----"
            find . -type f \( -name "*.map" -o -name "*.MAP" \) -print -exec ls -lh {} \;
            echo
          } | tee firmware_file_report.txt

      - name: Upload firmware file report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-file-report
          path: firmware_file_report.txt

      - name: Locate generated update SREC
        id: locate-update-srec
        shell: bash
        run: |
          python3 - << 'PY'
          from pathlib import Path
          import sys

          candidates = sorted(Path(".").rglob("*_update.srec"))

          print("Candidates matching *_update.srec:")
          for c in candidates:
              print(f" - {c} ({c.stat().st_size} bytes)")

          if len(candidates) == 0:
              print("ERROR: No *_update.srec found in workspace", file=sys.stderr)
              sys.exit(1)

          candidates = [c for c in candidates if c.stat().st_size > 100000]

          print("Large *_update.srec candidates:")
          for c in candidates:
              print(f" - {c} ({c.stat().st_size} bytes)")

          if len(candidates) == 0:
              print("ERROR: No large *_update.srec candidate found", file=sys.stderr)
              sys.exit(2)

          if len(candidates) > 1:
              print("ERROR: Multiple large *_update.srec files found. Refusing to guess.", file=sys.stderr)
              sys.exit(3)

          chosen = candidates[0]
          print(f"Chosen update SREC: {chosen}")

          with open("/tmp/update_srec_path.txt", "w", encoding="utf-8") as f:
              f.write(str(chosen))
          PY

          UPDATE_SREC_PATH="$(cat /tmp/update_srec_path.txt)"
          echo "update_srec_path=$UPDATE_SREC_PATH" >> "$GITHUB_OUTPUT"
          echo "Using update SREC: $UPDATE_SREC_PATH"

      - name: Verify generated update SREC
        shell: bash
        run: |
          python3 - << 'PY'
          from pathlib import Path

          p = Path("${{ steps.locate-update-srec.outputs.update_srec_path }}")
          if not p.exists():
              raise SystemExit(f"Update SREC not found: {p}")

          lines = [line.strip() for line in p.read_text(encoding="ascii").splitlines() if line.strip()]

          first_addr = None
          last_data_addr = None
          total_records = 0
          total_data_bytes = 0

          for line in lines:
              if line.startswith(("S1", "S2", "S3")):
                  t = line[1]
                  addr_hex_len = {"1": 4, "2": 6, "3": 8}[t]
                  addr = int(line[4:4 + addr_hex_len], 16)

                  data_hex = line[4 + addr_hex_len:-2]
                  data_len = len(data_hex) // 2
                  rec_last = addr + data_len - 1

                  if first_addr is None:
                      first_addr = addr

                  if last_data_addr is None or rec_last > last_data_addr:
                      last_data_addr = rec_last

                  total_records += 1
                  total_data_bytes += data_len

          if first_addr is None:
              raise SystemExit("No S1/S2/S3 data records found in update SREC")

          print(f"First data record address: 0x{first_addr:08X}")
          print(f"Last data record address:  0x{last_data_addr:08X}")
          print(f"Total data records:        {total_records}")
          print(f"Total data bytes:          {total_data_bytes}")
          print(f"Last SREC line:            {lines[-1]}")

          if first_addr != 0x08008000:
              raise SystemExit(f"Update SREC does not start at 0x08008000, got 0x{first_addr:08X}")
          PY

      - name: Upload generated update SREC
        uses: actions/upload-artifact@v4
        with:
          name: rusefi_update_uaefi_pro_fixed
          path: ${{ steps.locate-update-srec.outputs.update_srec_path }}

      - name: Dump all update SREC details
        shell: bash
        run: |
          python3 - << 'PY'
          from pathlib import Path

          def inspect(path):
              lines = [line.strip() for line in path.read_text(encoding="ascii").splitlines() if line.strip()]
              first_addr = None
              last_addr = None
              total_records = 0
              total_data_bytes = 0

              for line in lines:
                  if line.startswith(("S1", "S2", "S3")):
                      t = line[1]
                      addr_hex_len = {"1": 4, "2": 6, "3": 8}[t]
                      addr = int(line[4:4 + addr_hex_len], 16)
                      data_hex = line[4 + addr_hex_len:-2]
                      data_len = len(data_hex) // 2
                      rec_last = addr + data_len - 1

                      if first_addr is None:
                          first_addr = addr
                      if last_addr is None or rec_last > last_addr:
                          last_addr = rec_last

                      total_records += 1
                      total_data_bytes += data_len

              print(f"\nFILE: {path}")
              print(f"  size            = {path.stat().st_size}")
              print(f"  first_addr      = 0x{first_addr:08X}" if first_addr is not None else "  first_addr      = none")
              print(f"  last_addr       = 0x{last_addr:08X}" if last_addr is not None else "  last_addr       = none")
              print(f"  total_records   = {total_records}")
              print(f"  total_data_bytes= {total_data_bytes}")
              print(f"  last_line       = {lines[-1] if lines else 'EMPTY'}")

          for p in sorted(Path('.').rglob('*.srec')):
              inspect(p)
          PY